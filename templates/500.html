{% extends "base.html" %}

{% block title %}Server Error - Agro Management System{% endblock %}

{% block body %}
<div style="min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #f5f7fa 0%, #e8f5e9 100%); text-align: center; padding: 40px;">
    <div style="max-width: 500px;">
        <div style="font-size: 120px; font-weight: 800; color: var(--danger); opacity: 0.2; line-height: 1;">500</div>
        <div style="font-size: 64px; color: var(--danger); margin-bottom: 20px;"><i class="fas fa-exclamation-triangle"></i></div>
        <h1 style="font-size: 28px; font-weight: 700; margin-bottom: 15px;">Oops! Something Went Wrong</h1>
        <p style="color: var(--gray); margin-bottom: 30px; line-height: 1.7;">We're experiencing some technical difficulties. Please try again later or contact support if the problem persists.</p>
        <a href="{{ url_for('dashboard.index') if session.user_id else url_for('auth.login') }}" class="btn btn-primary btn-lg"><i class="fas fa-home"></i> Go to Dashboard</a>
    </div>
</div>
{% endblock %}
